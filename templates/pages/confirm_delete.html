{% extends 'base.html' %}

{% block title %}Eliminar Página{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-5 text-center">
                <div class="mb-4">
                    <i class="fas fa-exclamation-triangle fa-4x text-danger"></i>
                </div>
                <h2 class="h4 fw-bold mb-3">¿Eliminar esta página?</h2>
                <p class="text-muted mb-1">Estás por eliminar permanentemente:</p>
                <p class="fw-bold fs-5 mb-4">"{{ page.title }}"</p>
                <p class="text-muted small mb-4">Esta acción no se puede deshacer.</p>

                <form method="POST">
                    {% csrf_token %}
                    <div class="d-flex gap-3 justify-content-center">
                        <button type="submit" class="btn btn-danger px-4">
                            <i class="fas fa-trash me-2"></i>Sí, eliminar
                        </button>
                        <a href="{% url 'pages:detail' page.pk %}" class="btn btn-outline-secondary px-4">
                            <i class="fas fa-times me-2"></i>Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
